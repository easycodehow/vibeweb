<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지 작성 — AI바이브웹</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/board.css" />
</head>
<body>

  <!-- ━━━━━━━━━━━━━━ HEADER ━━━━━━━━━━━━━━ -->
  <header class="scrolled">
    <div class="inner">
      <a href="index.html" class="logo">AI바이브웹</a>
      <nav>
        <a href="index.html#intro">소개</a>
        <a href="index.html#curriculum">커리큘럼</a>
        <a href="index.html#techstack">기술스택</a>
        <a href="board.html" class="active">커뮤니티</a>
      </nav>
      <div class="nav-btns">
        <button class="btn-login" id="btnLogin" onclick="window.location.href='login.html'">로그인</button>
      </div>
    </div>
  </header>

  <!-- ━━━━━━━━━━━━━━ CONTENT ━━━━━━━━━━━━━━ -->
  <div class="page-wrap">
    <div class="inner" style="max-width: 860px;">
      <div class="page-header">
        <div class="page-label">Community</div>
        <h1 class="page-title" id="formTitle">공지 작성</h1>
      </div>

      <form class="write-form" id="writeForm" onsubmit="return false;">
        <div class="write-field">
          <label for="postTitle">제목</label>
          <input type="text" id="postTitle" placeholder="제목을 입력하세요" />
        </div>
        <div class="write-field">
          <label for="postContent">내용</label>
          <textarea id="postContent" placeholder="내용을 입력하세요"></textarea>
        </div>
        <div class="write-field">
          <label>파일 첨부</label>
          <label class="btn-file-select" for="postFile">파일 선택</label>
          <input type="file" id="postFile" multiple style="display:none" />
          <span class="file-hint">여러 파일을 동시에 선택할 수 있습니다 (파일당 최대 10MB)</span>
          <ul class="file-list" id="fileList"></ul>
        </div>
        <p class="write-msg" id="writeMsg"></p>
        <div class="write-actions">
          <a href="notice.html" class="btn-cancel" id="btnCancel">취소</a>
          <button type="submit" class="btn-save">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ━━━━━━━━━━━━━━ FOOTER ━━━━━━━━━━━━━━ -->
  <footer>
    <div class="inner">
      <div class="f-logo">AI바이브웹</div>
      <div class="f-links">
        <a href="#">개인정보처리방침</a>
        <a href="#">이용약관</a>
        <a href="index.html#contact">문의하기</a>
      </div>
    </div>
    <p class="f-copy">© 2026 AI바이브웹. All rights reserved.</p>
  </footer>

  <script type="module" src="js/notice-write.js"></script>
</body>
</html>
