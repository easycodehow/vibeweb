<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지 — AI바이브웹</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/board.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <!-- ━━━━━━━━━━━━━━ HEADER ━━━━━━━━━━━━━━ -->
  <header>
    <div class="inner">
      <a href="index.html" class="logo">AI바이브웹</a>
      <nav>
        <a href="index.html#intro">소개</a>
        <a href="index.html#curriculum">커리큘럼</a>
        <a href="board.html">커뮤니티</a>
      </nav>
      <div class="nav-btns">
        <button class="btn-login" id="btnLogin">로그인</button>
      </div>
    </div>
  </header>

  <!-- ━━━━━━━━━━━━━━ CONTENT ━━━━━━━━━━━━━━ -->
  <div class="page-wrap" id="adminWrap" style="display:none;">
    <div class="inner">
      <div class="page-header">
        <div class="page-label">Admin</div>
        <h1 class="page-title">문의 관리</h1>
      </div>

      <div class="board-info">총 <span id="totalCount">0</span>건의 문의 / 미읽음 <span id="unreadCount">0</span>건</div>

      <table class="board-table">
        <thead>
          <tr>
            <th class="col-no">번호</th>
            <th class="col-title">메시지 요약</th>
            <th class="col-author">이름</th>
            <th class="col-author">이메일</th>
            <th class="col-date">접수일</th>
            <th class="col-views">읽음</th>
          </tr>
        </thead>
        <tbody id="contactList">
          <tr><td colspan="6" class="board-empty">불러오는 중...</td></tr>
        </tbody>
      </table>

      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- 상세 모달 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-date" id="modalDate"></span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-meta">
        <span id="modalName"></span>
        <span id="modalEmail"></span>
      </div>
      <div class="modal-message" id="modalMessage"></div>
      <div class="modal-actions">
        <button class="btn-mark-read" id="btnMarkRead" onclick="toggleRead()">읽음 처리</button>
      </div>
    </div>
  </div>

  <!-- 접근 거부 -->
  <div class="access-denied" id="accessDenied" style="display:none;">
    <p>관리자만 접근할 수 있습니다.</p>
    <a href="index.html">홈으로</a>
  </div>

  <!-- ━━━━━━━━━━━━━━ FOOTER ━━━━━━━━━━━━━━ -->
  <footer>
    <div class="inner">
      <div class="f-logo">AI바이브웹</div>
      <div class="f-links">
        <a href="#">개인정보처리방침</a>
        <a href="#">이용약관</a>
        <a href="index.html#contact">문의하기</a>
      </div>
    </div>
    <p class="f-copy">© 2026 AI바이브웹. All rights reserved.</p>
  </footer>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
