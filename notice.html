<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지사항 — AI바이브웹</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/board.css" />
</head>
<body>

  <!-- ━━━━━━━━━━━━━━ HEADER ━━━━━━━━━━━━━━ -->
  <header>
    <div class="inner">
      <a href="index.html" class="logo">AI바이브웹</a>
      <nav>
        <a href="index.html#intro">소개</a>
        <a href="index.html#curriculum">커리큘럼</a>
        <a href="index.html#techstack">기술스택</a>
        <a href="board.html" class="active">커뮤니티</a>
      </nav>
      <div class="nav-btns">
        <button class="btn-login" id="btnLogin" onclick="window.location.href='login.html'">로그인</button>
      </div>
    </div>
  </header>

  <!-- ━━━━━━━━━━━━━━ CONTENT ━━━━━━━━━━━━━━ -->
  <div class="page-wrap">
    <div class="inner">
      <div class="page-header">
        <div class="page-label">Community</div>
        <h1 class="page-title">공지사항</h1>
      </div>

      <div class="board-toolbar">
        <form class="search-form" onsubmit="handleSearch(event)">
          <select id="searchType">
            <option value="title">제목</option>
            <option value="content">내용</option>
          </select>
          <input type="text" id="searchInput" placeholder="검색어를 입력하세요" />
          <button type="submit" class="btn-search">검색</button>
        </form>
        <button class="btn-write" id="btnWrite" style="display:none;">글쓰기</button>
      </div>

      <div class="board-info">총 <span id="totalCount">0</span>개의 공지</div>

      <table class="board-table">
        <thead>
          <tr>
            <th class="col-no">번호</th>
            <th class="col-title">제목</th>
            <th class="col-author">작성자</th>
            <th class="col-date">작성일</th>
            <th class="col-views">조회</th>
          </tr>
        </thead>
        <tbody id="postList">
          <tr><td colspan="5" class="board-empty">게시글을 불러오는 중...</td></tr>
        </tbody>
      </table>

      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- ━━━━━━━━━━━━━━ FOOTER ━━━━━━━━━━━━━━ -->
  <footer>
    <div class="inner">
      <div class="f-logo">AI바이브웹</div>
      <div class="f-links">
        <a href="#">개인정보처리방침</a>
        <a href="#">이용약관</a>
        <a href="index.html#contact">문의하기</a>
      </div>
    </div>
    <p class="f-copy">© 2026 AI바이브웹. All rights reserved.</p>
  </footer>

  <script type="module" src="js/notice.js"></script>
</body>
</html>
